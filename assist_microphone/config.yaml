name: "Assist Microphone Custom (with Volume)"
description: "Satelliten-Mikrofon mit eigener MQTT-Lautstärkeregelung für ALSA."
version: "1.0.2"
slug: "assist_microphone_custom"
init: false
arch:
  - aarch64
  - amd64
  - armv7
discovery:
  - wyoming
map:
  - share:ro
options:
  awake_wav: "/usr/src/sounds/awake.wav"
  done_wav: "/usr/src/sounds/done.wav"
  timer_finished_wav: "/usr/src/sounds/timer_finished.wav"
  timer_repeat_count: 3
  timer_repeat_delay: 0.75
  sound_enabled: true
  noise_suppression: 0
  auto_gain: 0
  mic_volume_multiplier: 1.0
  sound_volume_multiplier: 1.0
  debug_logging: false
  enable_volume_control: true
  volume_topic: "anker/volume/set"
schema:
  awake_wav: str
  done_wav: str
  timer_finished_wav: str
  timer_repeat_count: int
  timer_repeat_delay: float
  sound_enabled: bool
  noise_suppression: int
  auto_gain: int
  mic_volume_multiplier: float
  sound_volume_multiplier: float
  debug_logging: bool
  enable_volume_control: bool
  volume_topic: str
audio: true
mqtt: true
homeassistant: 2023.12.1
image: homeassistant/{arch}-addon-assist_microphone
